services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Enable virtual-hosted style: requests to <bucket>.minio → bucket <bucket>
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      default:
        aliases:
          # Polaris's AWS SDK constructs virtual-hosted URLs: http://warehouse.minio:9000/
          # This alias makes Docker DNS resolve that hostname to the MinIO container.
          - warehouse.minio

  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        echo 'MinIO bucket ready.'
      "

  polaris:
    image: apache/polaris:latest
    container_name: polaris
    ports:
      - "8181:8181"
    depends_on:
      mc-init:
        condition: service_completed_successfully
    environment:
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,polaris-secret"
      # Point Polaris's AWS SDK STS client at MinIO.
      # AWS_ENDPOINT_URL is respected by AWS SDK v2 for all service calls.
      AWS_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_REGION: "us-east-1"
